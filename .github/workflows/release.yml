name: Build and Release Xonix

on:
  push:
    tags:
      - 'v*' # Trigger only when a version tag is created, e.g., v1.0.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.arch == 'arm64' && 'debian:trixie' || 'ubuntu:latest' }}
    permissions:
      contents: read
    
    steps:
      - name: Install Build Dependencies
        run: |
          apt-get update
          apt-get install -y git gnat gprbuild libncursesada-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Xonix
        run: |
          mkdir -p bin
          gprbuild -P xonix.gpr
          mv bin/xonix bin/xonix-linux-${{ matrix.arch }}
          sha256sum bin/xonix-linux-${{ matrix.arch }} > bin/xonix-linux-${{ matrix.arch }}.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xonix-binaries-${{ matrix.arch }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: xonix-binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/xonix-linux-*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: "Automated Xonix release for Linux (amd64 and arm64)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
